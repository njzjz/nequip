<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" style="background-color:transparent"><defs><marker id="arrowhead" markerHeight="7" markerWidth="10" orient="auto" refX="10" refY="3.5"><polygon fill="#333" points="0 0 10 3.5 0 7"/></marker></defs><rect width="300" height="60" x="50" y="20" fill="#e8f4f8" stroke="#2196F3" stroke-width="2" rx="10"/><text x="200" y="45" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Raw Data File</text><text x="200" y="65" fill="#666" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">.xyz, .npz, etc.</text><line x1="200" x2="200" y1="80" y2="120" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/><rect width="300" height="60" x="50" y="130" fill="#e8f4f8" stroke="#2196F3" stroke-width="2" rx="10"/><text x="200" y="155" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Dataset Object(s)</text><text x="200" y="175" fill="#666" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">load raw data and parses into AtomicDataDicts</text><line x1="200" x2="200" y1="190" y2="230" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/><rect width="300" height="80" x="50" y="240" fill="#e8f4f8" stroke="#2196F3" stroke-width="2" rx="10"/><text x="200" y="265" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Data Transforms</text><text x="200" y="285" fill="#666" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">applied to each data point</text><text x="200" y="305" fill="#888" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">neighbor lists, type mapping, etc.</text><line x1="200" x2="200" y1="320" y2="360" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/><rect width="300" height="60" x="50" y="370" fill="#e8f4f8" stroke="#2196F3" stroke-width="2" rx="10"/><text x="200" y="395" font-family="Arial, sans-serif" font-size="16" fo